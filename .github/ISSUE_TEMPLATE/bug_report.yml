name: Bug Report
description: Report a bug or regression in smallest-box
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Please provide a minimal, reproducible report so the issue can be investigated quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact steps or a minimal code sample.
      placeholder: |
        1. Create items with dimensions ...
        2. Call $finder->find(...)
        3. Receive the unexpected result
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Describe what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Describe what actually happened, including error messages or incorrect output.
    validations:
      required: true
  - type: textarea
    id: code-sample
    attributes:
      label: Minimal reproducible code
      description: Paste the smallest possible example that reproduces the issue.
      render: php
  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: e.g. 8.3.6
    validations:
      required: true
  - type: dropdown
    id: algorithm
    attributes:
      label: Packing algorithm used
      options:
        - Guillotine (default)
        - MaxRects
        - ExtremePoint
        - Not applicable
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Box finding / candidate generation
        - Packing algorithm
        - Item rotations
        - Custom sort / pack orders
        - Box or Item value objects
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output or stack trace
      description: Paste any relevant exception message or stack trace.
      render: shell
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add anything else that could help reproduce or understand the issue.
